name: Lint

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - "**"

concurrency:
  # Cancel superseded runs on the same branch/PR; never cancel main-push runs
  # (they carry coverage + SonarCloud).
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        # lint:check (no --fix) so violations fail CI instead of being
        # silently auto-fixed in the throwaway runner workspace.
        run: npm run lint:check

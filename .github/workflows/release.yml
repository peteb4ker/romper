name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  issues: write
  id-token: write # Required for Azure Trusted Signing OIDC

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check SonarCloud Quality Gate
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          STATUS=$(curl -s -u "$SONAR_TOKEN:" \
            "https://sonarcloud.io/api/qualitygates/project_status?projectKey=peteb4ker_romper" \
            | jq -r '.projectStatus.status')

          ISSUES=$(curl -s -u "$SONAR_TOKEN:" \
            "https://sonarcloud.io/api/issues/search?projectKeys=peteb4ker_romper&severities=CRITICAL,BLOCKER&statuses=OPEN,CONFIRMED&ps=1" \
            | jq -r '.total')

          HOTSPOTS=$(curl -s -u "$SONAR_TOKEN:" \
            "https://sonarcloud.io/api/hotspots/search?projectKey=peteb4ker_romper&status=TO_REVIEW&ps=1" \
            | jq -r '.paging.total')

          echo "Quality Gate: $STATUS | Critical/Blocker: $ISSUES | Hotspots: $HOTSPOTS"

          if [ "$ISSUES" -gt 0 ] || [ "$HOTSPOTS" -gt 0 ]; then
            echo "::error::Release blocked: $ISSUES critical/blocker issues, $HOTSPOTS security hotspots"
            exit 1
          fi

      - name: Create GitHub issue on failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --repo ${{ github.repository }} \
            --title "Release ${{ github.ref_name }} blocked: SonarCloud quality gate" \
            --label "bug,priority:high" \
            --body "Release **${{ github.ref_name }}** blocked by SonarCloud issues. Fix issues and re-tag.
          - [Issues](https://sonarcloud.io/project/issues?id=peteb4ker_romper&severities=CRITICAL,BLOCKER)
          - [Hotspots](https://sonarcloud.io/project/security_hotspots?id=peteb4ker_romper)

          _Auto-created by release workflow._"

  build:
    needs: quality-gate
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        include:
          - os: ubuntu-latest
            platform: linux
            artifact-name: linux-artifacts
          - os: macos-latest
            platform: darwin
            artifact-name: mac-artifacts
          - os: windows-latest
            platform: win32
            artifact-name: windows-artifacts

    runs-on: ${{ matrix.os }}
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      - name: Install system dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libnss3-dev \
            libatk-bridge2.0-dev \
            libxkbcommon0 \
            libxcomposite1 \
            libxdamage1 \
            libxrandr2 \
            libgbm1 \
            libxss1 \
            libasound2-dev \
            libgtk-3-0

      # ── macOS: Import signing certificate into temporary keychain ──
      - name: Import macOS signing certificate
        if: matrix.os == 'macos-latest' && secrets.APPLE_CERTIFICATE != ''
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          # Create a temporary keychain
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 32)"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Import certificate from base64 secret
          CERT_PATH="$RUNNER_TEMP/certificate.p12"
          echo "$APPLE_CERTIFICATE" | base64 --decode > "$CERT_PATH"

          security import "$CERT_PATH" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A \
            -t cert \
            -f pkcs12 \
            -k "$KEYCHAIN_PATH"

          # Set partition list to allow codesign access without UI prompt
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Add temporary keychain to search list (prepend so it's found first)
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')

          # Extract identity name for Electron Forge
          IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "APPLE_IDENTITY=$IDENTITY" >> $GITHUB_ENV

          echo "Certificate imported successfully. Identity: $IDENTITY"

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build

      - name: Package application (Electron)
        env:
          # macOS notarization credentials (only used when secrets are configured)
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # APPLE_IDENTITY is set by the certificate import step above
        run: npm run make

      # ── Windows: Sign artifacts with Azure Trusted Signing ──
      - name: Sign Windows artifacts with Azure Trusted Signing
        if: matrix.os == 'windows-latest' && secrets.AZURE_CLIENT_ID != ''
        uses: azure/trusted-signing-action@v0.5.0
        with:
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
          endpoint: https://eus.codesigning.azure.net/
          trusted-signing-account-name: ${{ secrets.AZURE_SIGNING_ACCOUNT }}
          certificate-profile-name: ${{ secrets.AZURE_CERTIFICATE_PROFILE }}
          files-folder: out/make/squirrel.windows/x64/
          files-folder-filter: exe
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      # ── macOS: Clean up temporary keychain ──
      - name: Clean up macOS keychain
        if: always() && matrix.os == 'macos-latest' && secrets.APPLE_CERTIFICATE != ''
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          if [ -f "$KEYCHAIN_PATH" ]; then
            security delete-keychain "$KEYCHAIN_PATH" 2>/dev/null || true
          fi

      - name: Debug artifact structure (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          echo "=== Project root contents ==="
          Get-ChildItem -Force
          echo "=== Looking for out directory ==="
          Get-ChildItem -Recurse -Directory -Name "out" -ErrorAction SilentlyContinue
          echo "=== Looking for make directory ==="
          Get-ChildItem -Recurse -Directory -Name "make" -ErrorAction SilentlyContinue
          echo "=== All files with 'romper' or app name ==="
          Get-ChildItem -Recurse -Name "*romper*", "*Romper*" -ErrorAction SilentlyContinue | Select-Object -First 20

      - name: Debug artifact structure (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          echo "=== Project root contents ==="
          ls -la
          echo "=== Looking for out directory ==="
          find . -name "out" -type d
          echo "=== Looking for make directory ==="
          find . -name "make" -type d
          echo "=== All files with 'romper' or app name ==="
          find . -name "*romper*" -o -name "*Romper*" | head -20

      - name: Upload platform artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: out/make/
          retention-days: 7

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Need full history for commit parsing

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts/

      - name: Display structure of downloaded files
        run: find release-artifacts -type f -name "*" | head -20

      - name: Generate release notes
        id: release-notes
        run: |
          # Generate release notes using the Node.js script
          RELEASE_NOTES=$(node scripts/generate-github-release-notes.js ${{ github.ref_name }})

          # Output to GitHub Actions
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "$RELEASE_NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ github.ref_name }}
          name: Romper Sample Manager ${{ github.ref_name }}
          body: ${{ steps.release-notes.outputs.notes }}
          artifacts: |
            release-artifacts/**/*.zip
            release-artifacts/**/*.dmg
            release-artifacts/**/*.exe
            release-artifacts/**/*.msi
            release-artifacts/**/*.deb
            release-artifacts/**/*.rpm
            release-artifacts/**/*.AppImage
          makeLatest: true
          draft: false

name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      reason:
        description: "Manual trigger reason (e.g. testing signing on a non-tag branch). The `release` job is gated to tag pushes only, so manual runs build artifacts but do not publish."
        required: false
        default: "manual test run"

permissions:
  contents: write
  issues: write
  id-token: write # Required for Azure Trusted Signing OIDC

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check SonarCloud Quality Gate
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          STATUS=$(curl -s -u "$SONAR_TOKEN:" \
            "https://sonarcloud.io/api/qualitygates/project_status?projectKey=peteb4ker_romper" \
            | jq -r '.projectStatus.status')

          ISSUES=$(curl -s -u "$SONAR_TOKEN:" \
            "https://sonarcloud.io/api/issues/search?projectKeys=peteb4ker_romper&severities=CRITICAL,BLOCKER&statuses=OPEN,CONFIRMED&ps=1" \
            | jq -r '.total')

          HOTSPOTS=$(curl -s -u "$SONAR_TOKEN:" \
            "https://sonarcloud.io/api/hotspots/search?projectKey=peteb4ker_romper&status=TO_REVIEW&ps=1" \
            | jq -r '.paging.total')

          echo "Quality Gate: $STATUS | Critical/Blocker: $ISSUES | Hotspots: $HOTSPOTS"

          if [ "$ISSUES" -gt 0 ] || [ "$HOTSPOTS" -gt 0 ]; then
            echo "::error::Release blocked: $ISSUES critical/blocker issues, $HOTSPOTS security hotspots"
            exit 1
          fi

      - name: Create GitHub issue on failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --repo ${{ github.repository }} \
            --title "Release ${{ github.ref_name }} blocked: SonarCloud quality gate" \
            --label "bug,priority:high" \
            --body "Release **${{ github.ref_name }}** blocked by SonarCloud issues. Fix issues and re-tag.
          - [Issues](https://sonarcloud.io/project/issues?id=peteb4ker_romper&severities=CRITICAL,BLOCKER)
          - [Hotspots](https://sonarcloud.io/project/security_hotspots?id=peteb4ker_romper)

          _Auto-created by release workflow._"

  build:
    needs: quality-gate
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        include:
          - os: ubuntu-latest
            platform: linux
            artifact-name: linux-artifacts
          - os: macos-latest
            platform: darwin
            artifact-name: mac-artifacts
          - os: windows-latest
            platform: win32
            artifact-name: windows-artifacts

    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    # The `secrets` context cannot be used in step `if:` conditions, so surface
    # the gating secrets as job-level env and gate steps on `env.*` instead.
    env:
      APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      - name: Install system dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libnss3-dev \
            libatk-bridge2.0-dev \
            libxkbcommon0 \
            libxcomposite1 \
            libxdamage1 \
            libxrandr2 \
            libgbm1 \
            libxss1 \
            libasound2-dev \
            libgtk-3-0

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build

      # ── macOS: Package unsigned, sign with rcodesign, then make DMG/zip ──
      # See electron/forge#3131: @electron/osx-sign was silently falling back
      # to ad-hoc signing in CI. Replaced with indygreg/apple-code-sign-action
      # (rcodesign), which signs without needing a keychain.
      - name: Package Electron app (unsigned) — macOS
        if: matrix.os == 'macos-latest'
        run: npx electron-forge package -p darwin -a arm64

      - name: Materialize signing inputs — macOS
        if: matrix.os == 'macos-latest' && env.APPLE_CERTIFICATE != ''
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          ASC_API_KEY_JSON: ${{ secrets.ASC_API_KEY_JSON }}
        run: |
          # Decode p12 from base64 secret
          echo "$APPLE_CERTIFICATE" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          chmod 600 "$RUNNER_TEMP/cert.p12"
          # Write ASC API key JSON (produced by `rcodesign encode-app-store-connect-api-key`)
          printf '%s' "$ASC_API_KEY_JSON" > "$RUNNER_TEMP/asc-api-key.json"
          chmod 600 "$RUNNER_TEMP/asc-api-key.json"

      - name: Sign Romper.app — macOS
        if: matrix.os == 'macos-latest' && env.APPLE_CERTIFICATE != ''
        uses: indygreg/apple-code-sign-action@v1
        with:
          input_path: electron/out/Romper-darwin-arm64/Romper.app
          p12_file: ${{ runner.temp }}/cert.p12
          p12_password: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          # --for-notarization enables hardened runtime + timestamp server +
          # Developer ID cert validation in one flag.
          sign_args: |
            --for-notarization
            --entitlements-xml-file
            electron/resources/entitlements.plist

      - name: Make installers (skip package) — macOS
        if: matrix.os == 'macos-latest'
        run: npx electron-forge make --skip-package -p darwin -a arm64

      - name: Locate DMG artifact — macOS
        if: matrix.os == 'macos-latest' && env.APPLE_CERTIFICATE != ''
        id: dmg_path
        run: |
          DMG=$(find out/make -maxdepth 3 -name '*.dmg' -type f | head -1)
          if [ -z "$DMG" ]; then
            echo "::error::No DMG produced by Forge"
            find out/make -type f
            exit 1
          fi
          echo "path=$DMG" >> "$GITHUB_OUTPUT"
          echo "Found DMG: $DMG"

      - name: Sign + notarize + staple DMG — macOS
        if: matrix.os == 'macos-latest' && env.APPLE_CERTIFICATE != ''
        uses: indygreg/apple-code-sign-action@v1
        with:
          input_path: ${{ steps.dmg_path.outputs.path }}
          p12_file: ${{ runner.temp }}/cert.p12
          p12_password: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          notarize: true
          staple: true
          app_store_connect_api_key_json_file: ${{ runner.temp }}/asc-api-key.json

      # ── Linux / Windows: Forge handles everything in one step ──
      - name: Package application (Electron) — Linux/Windows
        if: matrix.os != 'macos-latest'
        run: npm run make

      # ── Windows: Sign artifacts with Azure Trusted Signing ──
      - name: Sign Windows artifacts with Azure Trusted Signing
        if: matrix.os == 'windows-latest' && env.AZURE_CLIENT_ID != ''
        uses: azure/trusted-signing-action@v0.5.0
        with:
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
          endpoint: https://eus.codesigning.azure.net/
          trusted-signing-account-name: ${{ secrets.AZURE_SIGNING_ACCOUNT }}
          certificate-profile-name: ${{ secrets.AZURE_CERTIFICATE_PROFILE }}
          files-folder: out/make/squirrel.windows/x64/
          files-folder-filter: exe
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      # ── macOS: Wipe signing inputs from the runner ──
      - name: Clean up signing inputs — macOS
        if: always() && matrix.os == 'macos-latest'
        run: |
          rm -P "$RUNNER_TEMP/cert.p12" 2>/dev/null || true
          rm -P "$RUNNER_TEMP/asc-api-key.json" 2>/dev/null || true

      - name: Debug artifact structure (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          echo "=== Project root contents ==="
          Get-ChildItem -Force
          echo "=== Looking for out directory ==="
          Get-ChildItem -Recurse -Directory -Name "out" -ErrorAction SilentlyContinue
          echo "=== Looking for make directory ==="
          Get-ChildItem -Recurse -Directory -Name "make" -ErrorAction SilentlyContinue
          echo "=== All files with 'romper' or app name ==="
          Get-ChildItem -Recurse -Name "*romper*", "*Romper*" -ErrorAction SilentlyContinue | Select-Object -First 20

      - name: Debug artifact structure (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          echo "=== Project root contents ==="
          ls -la
          echo "=== Looking for out directory ==="
          find . -name "out" -type d
          echo "=== Looking for make directory ==="
          find . -name "make" -type d
          echo "=== All files with 'romper' or app name ==="
          find . -name "*romper*" -o -name "*Romper*" | head -20

      - name: Upload platform artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: out/make/
          retention-days: 7

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Need full history for commit parsing

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts/

      - name: Display structure of downloaded files
        run: find release-artifacts -type f -name "*" | head -20

      - name: Generate release notes
        id: release-notes
        run: |
          # Generate release notes using the Node.js script
          RELEASE_NOTES=$(node scripts/generate-github-release-notes.js ${{ github.ref_name }})

          # Output to GitHub Actions
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "$RELEASE_NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ github.ref_name }}
          name: Romper Sample Manager ${{ github.ref_name }}
          body: ${{ steps.release-notes.outputs.notes }}
          artifacts: |
            release-artifacts/**/*.zip
            release-artifacts/**/*.dmg
            release-artifacts/**/*.exe
            release-artifacts/**/*.msi
            release-artifacts/**/*.deb
            release-artifacts/**/*.rpm
            release-artifacts/**/*.AppImage
          makeLatest: true
          draft: false

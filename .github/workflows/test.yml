name: Test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - "**"

env:
  NODE_VERSION: "22"
  JAVA_VERSION: "17"

jobs:
  # Unit tests - runs independently and uploads coverage
  unit-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      # Code checkout (shallow for performance)
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # Node.js setup with enhanced caching
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: "package-lock.json"

      # Install dependencies
      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit

      # Run unit tests (fast on PRs, coverage on main)
      - name: Run unit tests
        run: ${{ github.event_name == 'push' && 'npm run test:unit' || 'npm run test:unit:fast' }}
        env:
          CI: true

      # Upload unit test coverage artifacts (main only, for SonarCloud)
      - name: Upload unit coverage artifacts
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: unit-coverage
          path: coverage/unit/
          retention-days: 1

  # Cross-platform integration tests - runs in parallel with unit tests
  integration-tests:
    strategy:
      matrix:
        os: ${{ github.event_name == 'push' && fromJSON('["ubuntu-latest","windows-latest","macos-latest"]') || fromJSON('["ubuntu-latest"]') }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10

    steps:
      # Code checkout (shallow for performance)
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # Node.js setup with enhanced caching
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: "package-lock.json"

      # Install dependencies
      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit

      # System dependencies for Electron (Ubuntu only, optimized)
      - name: Install Electron dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libnss3-dev \
            libatk-bridge2.0-dev \
            libxkbcommon0 \
            libxcomposite1 \
            libxdamage1 \
            libxrandr2 \
            libgbm1 \
            libxss1 \
            libasound2-dev \
            libgtk-3-0 \
            xvfb

      # Virtual display setup (Linux only, optimized)
      - name: Setup virtual display
        if: matrix.os == 'ubuntu-latest'
        run: |
          export DISPLAY=:99
          Xvfb :99 -screen 0 1024x768x24 > /dev/null 2>&1 &
          sleep 2

      # Run integration tests (fast on PRs, coverage on main)
      - name: Run integration tests
        run: ${{ github.event_name == 'push' && 'npm run test:integration' || 'npm run test:integration:fast' }}
        env:
          CI: true
          DISPLAY: ${{ matrix.os == 'ubuntu-latest' && ':99' || '' }}

      # Upload integration coverage artifacts (main only, Ubuntu only)
      - name: Upload integration coverage artifacts
        if: github.event_name == 'push' && matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: integration-coverage
          path: coverage/integration/
          retention-days: 1

  # Analysis and reporting - downloads coverage artifacts and runs analysis
  analysis:
    needs: [unit-tests, integration-tests]
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 8
    permissions:
      contents: read
      issues: write

    steps:
      # Code checkout (full history for SonarCloud)
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Node.js setup with enhanced caching
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: "package-lock.json"

      # Install dependencies (minimal, no rebuild needed)
      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --ignore-scripts

      # Download coverage artifacts from previous jobs
      - name: Download unit coverage artifacts
        uses: actions/download-artifact@v4
        with:
          name: unit-coverage
          path: coverage/unit/

      - name: Download integration coverage artifacts
        uses: actions/download-artifact@v4
        with:
          name: integration-coverage
          path: coverage/integration/

      # Merge coverage reports without re-running tests
      - name: Merge coverage reports
        run: |
          npm run coverage:merge
          npm run coverage:total

      # Setup Java for SonarCloud (parallel with coverage)
      - name: Setup Java for SonarCloud
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: "temurin"

      # Code coverage upload (only on main branch)
      - name: Upload coverage to Codecov
        if: github.ref == 'refs/heads/main'
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: peteb4ker/romper
          files: ./coverage/coverage-final.json
          disable_search: true

      # SonarCloud analysis
      - name: SonarCloud Scan
        if: env.SONAR_TOKEN != ''
        uses: SonarSource/sonarcloud-github-action@v2
        with:
          projectBaseDir: .
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_ORGANIZATION: peteb4ker
          SONAR_HOST_URL: https://sonarcloud.io

      # Risk-informed quality gate check with deduplication
      - name: Check quality gate and manage issues
        if: always() && github.event_name == 'push'
        continue-on-error: true
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          GATE=$(curl -s -u "$SONAR_TOKEN:" \
            "https://sonarcloud.io/api/qualitygates/project_status?projectKey=peteb4ker_romper")
          STATUS=$(echo "$GATE" | jq -r '.projectStatus.status')

          ISSUES_RESP=$(curl -s -u "$SONAR_TOKEN:" \
            "https://sonarcloud.io/api/issues/search?projectKeys=peteb4ker_romper&severities=CRITICAL,BLOCKER,MAJOR&statuses=OPEN,CONFIRMED&ps=1")
          CRITICAL=$(echo "$ISSUES_RESP" | jq -r '.total')

          HOTSPOTS_RESP=$(curl -s -u "$SONAR_TOKEN:" \
            "https://sonarcloud.io/api/hotspots/search?projectKey=peteb4ker_romper&status=TO_REVIEW&ps=1")
          HOTSPOTS=$(echo "$HOTSPOTS_RESP" | jq -r '.paging.total')

          FAILED_CONDITIONS=$(echo "$GATE" | jq -r \
            '.projectStatus.conditions[] | select(.status == "ERROR") | "- **\(.metricKey)**: \(.actualValue) (required: \(.errorThreshold))"')

          # Search for existing open sonarcloud issue
          EXISTING=$(gh issue list --label "sonarcloud" --state open --json number,body --limit 1)
          EXISTING_NUMBER=$(echo "$EXISTING" | jq -r '.[0].number // empty')

          ISSUE_TITLE="SonarCloud: quality gate failure on main"

          if [ "$STATUS" != "OK" ]; then
            if [ -n "$EXISTING_NUMBER" ]; then
              # Extract previous issue count from existing issue body
              PREV_CRITICAL=$(echo "$EXISTING" | jq -r '.[0].body' | grep -oP 'Critical/Blocker/Major Issues:\*\* \K\d+' || echo "0")
              if [ "$CRITICAL" -gt "${PREV_CRITICAL:-0}" ]; then
                gh issue comment "$EXISTING_NUMBER" --body "## Quality Gate Still Failing — Worsened

          **Commit:** ${{ github.sha }}
          **Critical/Blocker/Major Issues:** $CRITICAL (was $PREV_CRITICAL)
          **Security Hotspots to Review:** $HOTSPOTS

          ### Failed Conditions
          $FAILED_CONDITIONS

          _Updated by CI on main branch push._"
                echo "::warning::SonarCloud issues worsened ($PREV_CRITICAL → $CRITICAL) — commented on #$EXISTING_NUMBER"
              else
                echo "SonarCloud quality gate still failing but not worsened (issues: $CRITICAL, was: $PREV_CRITICAL) — skipping duplicate"
              fi
            else
              # No existing issue — create a new one
              gh issue create \
                --title "$ISSUE_TITLE" \
                --label "bug,priority:high,sonarcloud" \
                --body "## SonarCloud Quality Gate Failed

          **Commit:** ${{ github.sha }}
          **Quality Gate:** $STATUS
          **Critical/Blocker/Major Issues:** $CRITICAL
          **Security Hotspots to Review:** $HOTSPOTS

          ### Failed Conditions
          $FAILED_CONDITIONS

          ### Links
          - [Issues](https://sonarcloud.io/project/issues?id=peteb4ker_romper&severities=CRITICAL,BLOCKER,MAJOR)
          - [Security Hotspots](https://sonarcloud.io/project/security_hotspots?id=peteb4ker_romper)
          - [Quality Gate](https://sonarcloud.io/summary/overall?id=peteb4ker_romper)

          _Auto-created by CI on main branch push._"
              echo "::warning::SonarCloud quality issues detected — GitHub issue created"
            fi
          else
            if [ -n "$EXISTING_NUMBER" ]; then
              gh issue close "$EXISTING_NUMBER" --comment "## Quality Gate Passed

          Quality gate passed on commit ${{ github.sha }}. Auto-closing.

          _Resolved by CI on main branch push._"
              echo "SonarCloud quality gate passed — auto-closed #$EXISTING_NUMBER"
            else
              echo "SonarCloud quality gate passed"
            fi
          fi
